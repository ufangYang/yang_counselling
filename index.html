<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lou Yang Counselling | CBT, Neuroscience &amp; Intercultural Mindfulness in Berlin</title>
    <meta name="description" content="Lou Yang offers counselling blending CBT, Cognitive Neuroscience, and Intercultural Mindfulness for multicultural professionals in Berlin. Online sessions available.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>L</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #0a0a0a;
            --black-light: #141414;
            --white: #FFFFFF;
            --white-soft: rgba(255,255,255,0.78);
            --white-muted: rgba(255,255,255,0.5);
            --font-heading: 'DM Sans', -apple-system, sans-serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            color: var(--white);
            background: var(--black);
            line-height: 1.7;
            font-weight: 400;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== FOCUS STYLES ===== */
        a:focus-visible, button:focus-visible {
            outline: 2px solid rgba(255,255,255,0.6);
            outline-offset: 3px;
        }

        .about-section a:focus-visible, .deeper a:focus-visible,
        .about-section button:focus-visible, .deeper button:focus-visible {
            outline-color: var(--black);
        }

        /* ===== NAFIGATION ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: background 0.5s ease;
        }

        nav.scrolled {
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(10px);
        }

        .nav-left {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .nav-left a {
            color: var(--white);
            text-decoration: none;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: opacity 0.3s;
        }

        .nav-left a:hover { opacity: 0.6; }

        .nav-row {
            display: flex;
            gap: 1.2rem;
        }

        .nav-logo {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 0.01em;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 1.5rem;
            white-space: nowrap;
        }

        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            position: relative;
            z-index: 101;
        }

        .nav-toggle span {
            display: block;
            width: 22px;
            height: 1px;
            background: var(--white);
            margin: 5px 0;
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1490750967868-88aa4f44baee?w=1600&q=80');
            background-size: cover;
            background-position: center;
            filter: brightness(0.35);
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 750px;
            padding: 0 2rem;
        }

        .hero h1 {
            font-family: var(--font-heading);
            font-size: clamp(2.4rem, 5vw, 3.6rem);
            font-weight: 400;
            line-height: 1.2;
            color: var(--white);
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .hero-sub {
            font-family: var(--font-body);
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            color: var(--white-soft);
            letter-spacing: 0.01em;
            margin-bottom: 2.5rem;
        }

        /* ===== SECTION: DEEPER CHANGE ===== */
        .deeper {
            background: var(--white);
            color: var(--black);
            padding: 8rem 2rem;
            text-align: center;
        }

        .deeper h2 {
            font-family: var(--font-heading);
            font-size: clamp(1.6rem, 3.2vw, 2.4rem);
            font-weight: 400;
            line-height: 1.35;
            max-width: 600px;
            margin: 0 auto 2rem;
            color: var(--black);
        }

        .deeper p {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.85;
            max-width: 600px;
            margin: 0 auto;
            color: #3a3a3a;
        }

        /* ===== RUSHPND: ABOUT ===== */
        .about-section {
            background: var(--white);
            color: var(--black);
            padding: 7rem 2rem;
            text-align: center;
        }

        .about-section h2 {
            font-family: var(--font-heading);
            font-size: clamp(1.6rem, 3.2vw, 2.4rem);
            font-weight: 400;
            margin-bottom: 2rem;
            color: var(--black);
        }

        .about-section p {
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.85;
            color: #3a3a3a;
            max-width: 640px;
            margin: 0 auto 1.5rem;
        }

        .lang-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem 0 0;
        }

        .lang-bar span {
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 300;
            color: #888;
        }
